name: Deploy WordPress Theme

on:
  push:
    branches:
      - main
    paths:
      - 'zh/**'
      - 'en/**'
      - 'assets/**'
      - 'integration.css'
      - 'main.js'
      - 'scripts/**'
      - 'tools/**'
      - 'docs/github-actions-ssh-deploy.md'
      - '.github/workflows/deploy-theme.yml'
  workflow_dispatch:

concurrency:
  group: luxureat-static-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WordPress theme
        run: |
          node scripts/build-luxureat-theme.mjs "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.deploy"

      - name: Verify theme package
        run: |
          node tools/verify-theme.mjs "$GITHUB_WORKSPACE/.deploy"

      - name: Verify deploy workflow
        run: |
          node tools/verify-deploy-workflow.mjs "$GITHUB_WORKSPACE"

      - name: Upload built theme artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxureat-static-theme
          path: |
            .deploy/luxureat-static
            .deploy/luxureat-static-theme.zip

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_THEME_DEPLOY == 'true' }}

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      TARGET_DIR: ${{ secrets.TARGET_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WordPress theme
        run: |
          node scripts/build-luxureat-theme.mjs "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.deploy"

      - name: Check required secrets
        run: |
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$SSH_PORT"
          test -n "$SSH_KEY"
          test -n "$TARGET_DIR"

      - name: Add SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target theme directory exists
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$TARGET_DIR'"

      - name: Deploy theme to WordPress
        run: |
          # Intended path: /var/www/vhosts/luxureat.cn/httpdocs/wp-content/themes/luxureat-static/
          rsync -az --delete \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            .deploy/luxureat-static/ \
            "$SSH_USER@$SSH_HOST:$TARGET_DIR"
