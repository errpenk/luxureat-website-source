name: Deploy Backup Preview

on:
  push:
    branches:
      - backup
  workflow_dispatch:

concurrency:
  group: backup-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout backup branch
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Optimize uploaded images
        run: |
          npm ci
          npm run images:optimize

      - name: Check generated page structure
        run: npm run site:check

      - name: Prepare static preview
        run: |
          mkdir -p .pages
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.deploy' \
            --exclude='docs' \
            --exclude='qa' \
            --exclude='scripts' \
            --exclude='site.config.mjs' \
            --exclude='tools' \
            --exclude='wordpress-plugins' \
            --exclude='node_modules' \
            ./ .pages/

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
