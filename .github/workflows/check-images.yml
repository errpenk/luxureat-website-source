name: Check Images

on:
  pull_request:
    paths:
      - 'assets/media/**'
      - 'tools/optimize-images.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/check-images.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Check image size and compression
        run: |
          npm ci
          npm run images:check
